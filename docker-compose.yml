version: "3.8"

services:
  workbuddy2openai:
    build: .
    container_name: workbuddy2openai
    ports:
      - "8787:8787"
    volumes:
      # 挂载宿主机 CodeBuddy 授权目录（参考路径，请根据平台修改）
      # macOS:
      #   - ~/Library/Application Support/CodeBuddyExtension/Data/Public/auth:/data/auth:ro
      # Windows:
      #   - %LOCALAPPDATA%/CodeBuddyExtension/Data/Public/auth:/data/auth:ro
      # Linux:
      #   - ~/.local/share/CodeBuddyExtension/Data/Public/auth:/data/auth:ro
      # 持久化上传的授权文件和激活状态
      - ./config:/app/.config
    environment:
      # 如需鉴权，设置 API Key（客户端请求时需携带相同的 key）
      - CODEBUDDY2OPENAI_KEY=
      # 指定 auth 文件挂载路径（转换器会自动读取）
      - CODEBUDDY_AUTH_DIR=/data/auth
    command: >
      python3 converter.py
      --host 0.0.0.0
      --port 8787
      --skip-check
      --desensitize
    restart: unless-stopped
