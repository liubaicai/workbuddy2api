# ============================================================
# Codex 接入 CodeBuddy/WorkBuddy 订阅 —— 示例配置（片段）
# ------------------------------------------------------------
# ⚠️ 本文件只是「示例」。请把下面 [model_providers.codebuddy] 与
#    [profiles.codebuddy] 两段【手动】复制/合并进你自己的 Codex 配置
#    （通常是 ~/.codex/config.toml）。本脚本绝不自动改写你的配置。
#
# 前提：转换器已在本地运行（见 README.md）
#   python3 converter.py --port 8787
# ============================================================

# 1) 定义一个指向本地转换器的「模型提供商」
[model_providers.codebuddy]
name = "CodeBuddy (via local converter)"
base_url = "http://127.0.0.1:8787/v1"
env_key = "CODEBUDDY2OPENAI_KEY"   # 转换器未启用 --api-key 时，可随便填一个环境变量名
wire_api = "chat"                  # OpenAI 兼容的 /v1/chat/completions

# 2) 定义一个使用该提供商的 profile
[profiles.codebuddy]
model = "glm-5.2"                  # 也可用 kimi-k2.7 / deepseek-v4-pro / auto 等
model_provider = "codebuddy"

# 使用方式（任选其一）：
#   codex --profile codebuddy "你的问题"
#   或在 ~/.codex/config.toml 里设 model_provider = "codebuddy" 作为默认
